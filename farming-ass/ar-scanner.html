<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>
        Smart AR Crop Disease Scanner
    </title>

    <!-- A-FRAME -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <!-- AR.JS -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

    <style>

        body{
            margin:0;
            overflow:hidden;
            font-family:Arial, sans-serif;
        }

        .back-button{

            position:absolute;

            top:20px;
            left:20px;

            z-index:999;

            padding:14px 30px;

            border:none;

            border-radius:40px;

            background:linear-gradient(
                135deg,
                #38b000,
                #70e000
            );

            color:white;

            font-size:16px;

            font-weight:bold;

            cursor:pointer;

            box-shadow:0 0 20px rgba(56,176,0,0.7);

            transition:0.3s;
        }

        .back-button:hover{

            transform:scale(1.08);
        }

        .title{

            position:absolute;

            top:20px;
            right:20px;

            z-index:999;

            padding:16px 28px;

            border-radius:20px;

            background:rgba(255,255,255,0.15);

            backdrop-filter:blur(10px);

            color:white;

            font-size:20px;

            font-weight:bold;

            border:1px solid rgba(255,255,255,0.2);

            box-shadow:0 0 25px rgba(255,255,255,0.2);
        }

        .scan-info{

            position:absolute;

            bottom:20px;
            left:50%;

            transform:translateX(-50%);

            z-index:999;

            width:420px;

            max-width:90%;

            padding:18px;

            border-radius:20px;

            background:rgba(0,0,0,0.45);

            backdrop-filter:blur(12px);

            color:white;

            line-height:1.8;

            text-align:center;
        }

        .highlight{

            color:#70e000;

            font-weight:bold;
        }

    </style>

</head>

<body>

    <!-- BACK -->
    <a href="farmindex.html">

        <button class="back-button">

            ⬅ Back To Home

        </button>

    </a>

    <!-- TITLE -->
    <div class="title">

        🌿 Smart AR Crop Scanner

    </div>

    <!-- INFO -->
    <div class="scan-info">

        Point the camera towards the
        <span class="highlight">
        Hiro Marker
        </span>

        to visualize crop disease detection,
        treatment recommendation,
        and smart farming guidance.

    </div>

    <!-- AR SCENE -->
    <a-scene

        embedded

        vr-mode-ui="enabled:false"

        renderer="
        logarithmicDepthBuffer:true;"

        arjs="sourceType: webcam; debugUIEnabled:false;">

        <!-- MARKER -->
        <a-marker preset="hiro">

            <!-- GLOWING INFECTED CROP -->

            <a-cylinder

                position="0 1 0"

                radius="0.35"

                height="2.8"

                color="red"

                material="
                opacity:0.85"

                animation="
                property: scale;
                to: 1.2 1.2 1.2;
                dir: alternate;
                loop: true;
                dur: 900">

            </a-cylinder>

            <!-- DISEASE WARNING RING -->

            <a-ring

                position="0 2.5 0"

                rotation="-90 0 0"

                radius-inner="0.6"

                radius-outer="0.9"

                color="#ff0000"

                animation="
                property: rotation;
                to: -90 360 0;
                loop: true;
                dur: 3000">

            </a-ring>

            <!-- FLOATING ALERT ICON -->

            <a-text

                value="⚠ DISEASE DETECTED"

                position="-1.8 4 0"

                color="#ff0000"

                width="8"

                animation="
                property: position;
                to: -1.8 4.3 0;
                dir: alternate;
                loop: true;
                dur: 1500">

            </a-text>

            <!-- DISEASE NAME -->

            <a-plane

                position="0 3 0"

                width="4.5"

                height="1"

                color="#14532d"

                opacity="0.88">

            </a-plane>

            <a-text

                value="Stripe Rust Disease"

                position="-1.7 3.1 0.1"

                color="white"

                width="6">

            </a-text>

            <!-- TREATMENT PANEL -->

            <a-plane

                position="0 1.8 0"

                width="5"

                height="2.2"

                color="#1b4332"

                opacity="0.9"

                animation="
                property: scale;
                to: 1.03 1.03 1.03;
                dir: alternate;
                loop: true;
                dur: 1800">

            </a-plane>

            <a-text

                value="Treatment:\nApply Fungicide\nEvery 5 Days\n\nSeverity: Moderate"

                position="-2 2.3 0.1"

                color="#ffffff"

                width="6">

            </a-text>

            <!-- SCANNING LIGHT -->

            <a-box

                position="0 0.2 0"

                width="2"

                height="0.05"

                depth="2"

                color="#00ffea"

                opacity="0.7"

                animation="
                property: position;
                from: 0 0.2 0;
                to: 0 2 0;
                dir: alternate;
                loop: true;
                dur: 1200">

            </a-box>

            <!-- HEALTH INDICATOR -->

            <a-sphere

                position="2 2 0"

                radius="0.25"

                color="#ff0000"

                animation="
                property: scale;
                to: 1.4 1.4 1.4;
                dir: alternate;
                loop: true;
                dur: 800">

            </a-sphere>

        </a-marker>

        <!-- CAMERA -->
        <a-entity camera></a-entity>

    </a-scene>

</body>

</html>
